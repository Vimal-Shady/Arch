[config]
reload_apps = true

[config.wallpaper]
command = "awww"
arguments = [ "img", "-t", "fade", "--transition-duration", "0.5", "--transition-step", "255", "--transition-fps", "60", "-f", "Nearest",]
set = true

[templates.hyprland]
input_path = "~/.config/Shady-XShell/config/matugen/templates/hyprland-colors.conf"
output_path = "~/.config/Shady-XShell/config/hypr/colors.conf"
post_hook = "hyprctl reload"

[templates.waybar]
input_path = "/home/shady/.config/matugen/templates/colors.css.tmpl"
output_path = "/home/shady/.config/waybar/colors.css"

[templates.rofi]
input_path = "/home/shady/.config/matugen/templates/rofi.rasi.tmpl"
output_path = "/home/shady/.config/rofi/colors.rasi"

[templates.shady-xshell]
input_path = "~/.config/Shady-XShell/config/matugen/templates/shady-xshell.css"
output_path = "~/.config/Shady-XShell/styles/colors.css"
post_hook = "fabric-cli exec shady-xshell 'app.set_css()' &"

[config.custom_colors.red]
color = "#FF0000"
blend = true

[config.custom_colors.green]
color = "#00FF00"
blend = true

[config.custom_colors.yellow]
color = "#FFFF00"
blend = true

[config.custom_colors.blue]
color = "#0000FF"
blend = true

[config.custom_colors.magenta]
color = "#FF00FF"
blend = true

[config.custom_colors.cyan]
color = "#00FFFF"
blend = true

[config.custom_colors.white]
color = "#FFFFFF"
blend = true
